<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Guía Turística Multimedia de Costa Rica">
  <title>Guía Turística de Costa Rica</title>

  <link rel="stylesheet" href="css/global.css">

  <!-- Punto de entrada de la aplicación -->
  <script type="module" src="modules/app.js"></script>
</head>

<body>

  <!-- Header principal -->
  <app-header></app-header>

  <main id="app">

    <!-- Vista: Mapa -->
    <section id="vista-mapa" class="vista activa">
      <div class="contenedor">
        <mapa-interactivo></mapa-interactivo>
      </div>
    </section>

    <!-- Vista: Listado de destinos -->
    <section id="vista-listado" class="vista">
      <div class="contenedor">

        <div class="listado-header">
          <!-- Se llena dinámicamente desde app.js -->
          <h2 id="titulo-region">Seleccione una región</h2>

         <button id="btn-volver-mapa" class="btn-volver">← Volver al mapa</button>
        </div>

        <!-- Contenedor dinámico de cards -->
        <div id="grid-destinos" class="grid-destinos"></div>

      </div>
    </section>

    <!-- Vista: Detalle -->
    <section id="vista-detalle" class="vista">
      <div class="contenedor">

        <button id="btn-volver" class="btn-volver" aria-label="Volver al listado">
          ← Volver
        </button>

        <!-- Se renderiza dinámicamente -->
        <div id="contenedor-detalle"></div>

      </div>
    </section>

  </main>

  <footer class="app-footer">
    <p>Guía Turística de Costa Rica · IF7102 · UCR Guanacaste 2026</p>
  </footer>

</body>

</html>
